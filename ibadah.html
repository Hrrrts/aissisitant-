<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ais Ibadah</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        
        body { background-color: #09090b; color: #ededed; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 20px; overflow-x: hidden;}
        .top-bar { display: flex; align-items: center; margin-bottom: 20px; margin-top: 10px; }
        .back-btn { color: #ffffff; text-decoration: none; display: flex; align-items: center; cursor: pointer; }
        .title-header { margin: 0 auto; font-size: 15px; font-weight: 700; color: #ffffff; padding-right: 24px; letter-spacing: 0.5px; text-transform: uppercase;}
        
        .date-display { text-align: center; font-size: 14px; color: #a1a1aa; margin-bottom: 30px; letter-spacing: 1px; font-weight: 600;}
        
        /* Tema Midnight Colornote */
        .section-card { background: #18181b; border: 1px solid #27272a; border-radius: 16px; padding: 20px; margin-bottom: 20px;}
        .section-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #fff; margin: 0 0 15px 0; display: flex; align-items: center; justify-content: space-between;}
        
        /* Grid Tombol Waktu Salat */
        .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        
        .track-btn { background: #09090b; border: 1px solid #27272a; color: #a1a1aa; padding: 15px 5px; border-radius: 12px; text-align: center; font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 8px;}
        .track-btn svg { width: 20px; height: 20px; stroke: #a1a1aa; transition: 0.2s; }
        
        /* State Tombol: Loading & Active */
        .track-btn.syncing { border-color: #fbbf24; color: #fbbf24; opacity: 0.8; pointer-events: none; animation: pulse 1s infinite alternate; }
        .track-btn.syncing svg { stroke: #fbbf24; }
        
        .track-btn.active { background: rgba(74, 222, 128, 0.1); border-color: #4ade80; color: #4ade80; }
        .track-btn.active svg { stroke: #4ade80; }
        .track-btn:active { transform: scale(0.95); }

        @keyframes pulse {
            from { box-shadow: 0 0 0px #fbbf24; }
            to { box-shadow: 0 0 10px #fbbf24; }
        }

        /* AI Assistant Box - REDESIGNED */
        .ai-box { 
            background: #09090b; 
            border: 1px solid #27272a; 
            padding: 16px; 
            border-radius: 12px; 
            font-size: 13px; 
            color: #a1a1aa; 
            margin-bottom: 15px; 
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .ai-header { display: flex; align-items: center; gap: 8px; color: #fbbf24; font-weight: 700; font-size: 14px; }
        .ai-header svg { width: 18px; height: 18px; stroke: #fbbf24; }
        .ai-text strong { color: #fff; }
        
        /* Tombol Link Quran */
        .btn-quran-link {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.2);
            padding: 10px 14px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            transition: 0.2s;
        }
        .btn-quran-link:active { transform: scale(0.97); background: rgba(251, 191, 36, 0.2); }

        /* Murojaah Input */
        .input-box { width: 100%; background: #09090b; border: 1px solid #27272a; color: #fff; padding: 14px; border-radius: 12px; font-size: 14px; outline: none; box-sizing: border-box; resize: none; margin-bottom: 10px; font-family: inherit;}
        .input-box:focus { border-color: #fbbf24; }
        .btn-save { background: #fbbf24; color: #000; border: none; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.2s; font-family: inherit;}
        .btn-save:active { transform: scale(0.95); }
        .btn-save:disabled { background: #3f3f46; color: #a1a1aa; cursor: not-allowed; }

        /* Histori Singkat */
        .history-list { margin-top: 15px; display: flex; flex-direction: column; gap: 10px;}
        .h-item { background: #09090b; padding: 12px; border-radius: 10px; border: 1px solid #27272a; display: flex; justify-content: space-between; align-items: center;}
        .h-date { font-size: 13px; color: #fff; font-weight: 700;}
        .h-stats { font-size: 12px; color: #a1a1aa;}
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="index.html" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <h2 class="title-header">Ais Ibadah</h2>
        <div style="width:24px;"></div>
    </div>

    <div class="date-display" id="dateDisplay">Memuat tanggal...</div>

    <div class="section-card">
        <h3 class="section-title">Salat 5 Waktu</h3>
        <div class="grid-5">
            <div class="track-btn" id="btn-subuh" onclick="toggleTrack('solat', 'subuh')">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
                SUBUH
            </div>
            <div class="track-btn" id="btn-dzuhur" onclick="toggleTrack('solat', 'dzuhur')">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                DZUHUR
            </div>
            <div class="track-btn" id="btn-ashar" onclick="toggleTrack('solat', 'ashar')">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                ASHAR
            </div>
            <div class="track-btn" id="btn-maghrib" onclick="toggleTrack('solat', 'maghrib')">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                MAGHRIB
            </div>
            <div class="track-btn" id="btn-isya" onclick="toggleTrack('solat', 'isya')">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/><circle cx="15" cy="8" r="1" fill="currentColor"/></svg>
                ISYA
            </div>
        </div>
    </div>

    <div class="section-card">
        <h3 class="section-title">Salat Sunnah</h3>
        <div class="grid-4">
            <div class="track-btn" id="btn-tahajud" onclick="toggleTrack('sunnah', 'tahajud')">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                TAHAJUD
            </div>
            <div class="track-btn" id="btn-dhuha" onclick="toggleTrack('sunnah', 'dhuha')">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                DHUHA
            </div>
            <div class="track-btn" id="btn-rawatib" onclick="toggleTrack('sunnah', 'rawatib')">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                RAWATIB
            </div>
            <div class="track-btn" id="btn-witir" onclick="toggleTrack('sunnah', 'witir')">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 2L2 22h20L12 2z"/></svg>
                WITIR
            </div>
        </div>
    </div>

    <div class="section-card">
        <h3 class="section-title">Murojaah / Tilawah</h3>
        
        <div class="ai-box" id="aiMessage">
            <div class="ai-header">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                Ais Assistant
            </div>
            <div class="ai-text">Memuat rekomendasi murojaah hari ini...</div>
        </div>

        <textarea id="murojaahInput" class="input-box" rows="2" placeholder="Cth: Selesai baca Surah Al-Mulk ayat 1-30"></textarea>
        <button class="btn-save" id="btnSaveMurojaah" onclick="saveMurojaah()">Simpan Catatan</button>
    </div>

    <div class="section-card">
        <h3 class="section-title">Rekap 7 Hari Terakhir</h3>
        <div class="history-list" id="historyList">
            <p style="text-align:center; color:#555; font-size:12px;">Memuat data...</p>
        </div>
    </div>

    <script>
        // Set Tanggal Hari Ini
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('dateDisplay').innerText = now.toLocaleDateString('id-ID', options);

        let todayData = { solat: {}, sunnah: {}, murojaah: '' };

        // ALGORITMA AI SMART TARGET MUROJAAH DENGAN LINK
        function generateAITarget() {
            // Pasangan target teks dan URL spesifik ke quran.com
            const targets = [
                { text: "Surah Al-Mulk (Tabarak) full", url: "https://quran.com/67" },
                { text: "Surah Ar-Rahman ayat 1-40", url: "https://quran.com/55/1-40" },
                { text: "Surah Al-Waqi'ah ayat 1-50", url: "https://quran.com/56/1-50" },
                { text: "Surah Al-Kahf ayat 1-15", url: "https://quran.com/18/1-15" },
                { text: "Surah An-Naba s/d An-Naziat", url: "https://quran.com/78" },
                { text: "Surah Yasin ayat 1-40", url: "https://quran.com/36/1-40" },
                { text: "Surah As-Sajdah ayat 1-30", url: "https://quran.com/32" },
                { text: "Surah Al-Qalam (Juz 29)", url: "https://quran.com/68" },
                { text: "Surah Luqman ayat 1-20", url: "https://quran.com/31/1-20" },
                { text: "Surah Al-Insan full", url: "https://quran.com/76" }
            ];
            
            const dateStr = now.toDateString();
            let hash = 0;
            for (let i = 0; i < dateStr.length; i++) {
                hash = dateStr.charCodeAt(i) + ((hash << 5) - hash);
            }
            const index = Math.abs(hash) % targets.length;
            const target = targets[index];
            
            const bookIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>`;

            document.getElementById('aiMessage').innerHTML = `
                <div class="ai-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                    Ais Assistant
                </div>
                <div class="ai-text">
                    Halo Haris! Rekomendasi jadwal murojaah kamu hari ini adalah menyelesaikan <strong>${target.text}</strong>. Semangat ya!
                </div>
                <a href="${target.url}" target="_blank" class="btn-quran-link">
                    ${bookIcon} Buka Al-Quran
                </a>
            `;
        }
        generateAITarget();

        async function loadData() {
            try {
                const res = await fetch('/api/ibadah');
                if (!res.ok) throw new Error('Network response was not ok');
                const data = await res.json();
                
                if(data.today) {
                    todayData = data.today;
                    for (const [key, value] of Object.entries(todayData.solat || {})) {
                        if(value) document.getElementById('btn-' + key).classList.add('active');
                    }
                    for (const [key, value] of Object.entries(todayData.sunnah || {})) {
                        if(value) document.getElementById('btn-' + key).classList.add('active');
                    }
                    if(todayData.murojaah) {
                        document.getElementById('murojaahInput').value = todayData.murojaah;
                    }
                }

                const list = document.getElementById('historyList');
                if(data.history && data.history.length > 0) {
                    list.innerHTML = data.history.map(h => {
                        const solatCount = Object.values(h.solat || {}).filter(Boolean).length;
                        return `
                        <div class="h-item">
                            <div class="h-date">${h.date}</div>
                            <div class="h-stats">Wajib: ${solatCount}/5 | Murojaah: ${h.murojaah ? '✓' : '-'}</div>
                        </div>`;
                    }).join('');
                } else {
                    list.innerHTML = '<p style="text-align:center; color:#a1a1aa; font-size:12px;">Belum ada histori.</p>';
                }
            } catch (e) {
                console.log('Error memuat data ibadah:', e);
                document.getElementById('historyList').innerHTML = '<p style="text-align:center; color:#ef4444; font-size:12px;">Gagal memuat data dari server.</p>';
            }
        }

        async function toggleTrack(type, key) {
            const btn = document.getElementById('btn-' + key);
            
            if (btn.classList.contains('syncing')) return; 

            if(!todayData[type]) todayData[type] = {};
            const isCurrentlyDone = todayData[type][key] || false;
            const newValue = !isCurrentlyDone;
            
            btn.classList.add('syncing');
            btn.classList.remove('active');

            try {
                const res = await fetch('/api/ibadah', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, key, value: newValue })
                });

                if (!res.ok) throw new Error('Gagal dari database');

                todayData[type][key] = newValue;
                btn.classList.remove('syncing');
                if(newValue) {
                    btn.classList.add('active');
                }
            } catch (e) {
                btn.classList.remove('syncing');
                alert('Jaringan tidak stabil, gagal menyimpan ke database.');
                if(isCurrentlyDone) btn.classList.add('active'); 
            }
        }

        async function saveMurojaah() {
            const val = document.getElementById('murojaahInput').value;
            const btn = document.getElementById('btnSaveMurojaah');
            
            btn.innerText = 'Menyimpan...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/ibadah', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'murojaah', key: 'text', value: val })
                });
                
                if (!res.ok) throw new Error('Database error');

                btn.innerText = 'Tersimpan ✓';
                setTimeout(() => { 
                    btn.innerText = 'Simpan Catatan'; 
                    btn.disabled = false;
                }, 2000);
            } catch (e) {
                alert('Gagal menyimpan catatan murojaah.');
                btn.innerText = 'Simpan Catatan';
                btn.disabled = false;
            }
        }

        loadData();
    </script>
</body>
</html>
