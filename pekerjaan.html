<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ais Pekerjaan</title>
    <link rel="stylesheet" href="css/pekerjaan.css">
    <link rel="stylesheet" href="css/global.css"> 
</head>
<body>
    <div class="top-bar">
        <a href="index.html" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <h2 class="title-header">Pekerjaan</h2>
        <div style="width:24px;"></div>
    </div>

    <div class="main-card">
        <div class="card-header-flex">
            <h3 class="section-title-fixed">Status Inventori</h3>
            <button class="btn-wa-top" onclick="copyRekapWA()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                COPY WA
            </button>
        </div>

        <div class="form-row">
            <input type="text" id="invItem" class="input-pekerjaan" placeholder="Nama Barang..." autofocus>
            <input type="number" id="invQty" class="input-pekerjaan" placeholder="Qty">
        </div>
        <div class="form-full">
            <input type="text" id="invKet" class="input-pekerjaan" placeholder="Keterangan (Opsional)">
        </div>
        <button id="btnSimpanFixed" class="btn-simpan-fixed" onclick="saveFixedInventory()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            SIMPAN LOG
        </button>

        <div class="table-responsive">
            <table class="table-log">
                <thead>
                    <tr>
                        <th width="15%">JAM</th>
                        <th width="40%">ITEM</th>
                        <th width="15%">QTY</th>
                        <th width="20%">KET</th>
                        <th width="10%"></th>
                    </tr>
                </thead>
                <tbody id="tbodyLog">
                    </tbody>
            </table>
        </div>
    </div>

    <h3 class="sub-title-workspace">Kategori Kerja Lain</h3>
    <div class="workspace-grid" id="customWorkspaceGrid">
        </div>

    <button class="global-add" onclick="createNewBlock()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>

    <div id="workToast" class="toast"></div>

    <script src="js/pekerjaan.js"></script>
</body>
</html>
