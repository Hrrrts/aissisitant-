<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ais Task</title>
    <style>
        body { background-color: #000000; color: #ededed; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 20px; overflow-x: hidden;}
        .top-bar { display: flex; align-items: center; margin-bottom: 20px; margin-top: 10px; }
        .back-btn { color: #ffffff; text-decoration: none; display: flex; align-items: center; cursor: pointer; }
        .title-header { margin: 0 auto; font-size: 15px; font-weight: 600; color: #ffffff; padding-right: 24px; letter-spacing: 0.5px; text-transform: uppercase;}
        
        /* Input Tugas Baru */
        .input-section { display: flex; gap: 10px; margin-bottom: 25px; }
        .input-box { flex: 1; background: #111; border: 1px solid #222; color: #fff; padding: 14px 20px; border-radius: 12px; font-size: 14px; outline: none; }
        .input-box:focus { border-color: #444; }
        .btn-add { background: #fff; color: #000; border: none; border-radius: 12px; width: 50px; font-size: 20px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center;}
        .btn-add:active { transform: scale(0.95); }

        /* Papan Kanban (Bisa di-swipe ke samping) */
        .kanban-board { display: flex; gap: 15px; overflow-x: auto; scroll-snap-type: x mandatory; padding-bottom: 20px; scrollbar-width: none; }
        .kanban-board::-webkit-scrollbar { display: none; }
        
        .kanban-col { min-width: 85vw; scroll-snap-align: center; background: #0a0a0a; border: 1px solid #222; border-radius: 16px; padding: 16px; box-sizing: border-box; height: 65vh; overflow-y: auto; display: flex; flex-direction: column;}
        
        /* Header Kolom */
        .col-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #222;}
        .col-title { font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;}
        .col-count { background: #222; padding: 2px 8px; border-radius: 10px; font-size: 12px; color: #888;}
        
        /* Warna Header */
        .header-todo .col-title { color: #f87171; }
        .header-progress .col-title { color: #fbbf24; }
        .header-done .col-title { color: #4ade80; }

        /* Kartu Tugas */
        .task-card { background: #151515; border: 1px solid #2a2a2a; padding: 16px; border-radius: 12px; margin-bottom: 12px; animation: fadeIn 0.3s ease; display: flex; flex-direction: column; gap: 12px;}
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .task-text { font-size: 14px; color: #eee; line-height: 1.5; }
        
        /* Tombol Aksi di Kartu */
        .task-actions { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #222; padding-top: 10px;}
        .move-btns { display: flex; gap: 8px; }
        .t-btn { background: #222; border: none; color: #aaa; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s;}
        .t-btn:active { background: #444; color: #fff;}
        .t-btn-delete { color: #f87171; background: transparent; padding: 6px;}
        
        /* Bantuan Swipe */
        .swipe-hint { text-align: center; font-size: 11px; color: #555; margin-bottom: 10px; letter-spacing: 1px;}
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="index.html" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <h2 class="title-header">Ais Task</h2>
        <div style="width:24px;"></div>
    </div>

    <div class="input-section">
        <input type="text" id="taskInput" class="input-box" placeholder="Tambah target atau tugas baru...">
        <button class="btn-add" onclick="addTask()">+</button>
    </div>

    <div class="swipe-hint">⟵ SWIPE UNTUK MELIHAT STATUS ⟶</div>

    <div class="kanban-board">
        <div class="kanban-col">
            <div class="col-header header-todo">
                <span class="col-title">Belum</span>
                <span class="col-count" id="count-todo">0</span>
            </div>
            <div id="col-todo" style="flex:1;"></div>
        </div>

        <div class="kanban-col">
            <div class="col-header header-progress">
                <span class="col-title">Proses</span>
                <span class="col-count" id="count-progress">0</span>
            </div>
            <div id="col-progress" style="flex:1;"></div>
        </div>

        <div class="kanban-col">
            <div class="col-header header-done">
                <span class="col-title">Selesai</span>
                <span class="col-count" id="count-done">0</span>
            </div>
            <div id="col-done" style="flex:1;"></div>
        </div>
    </div>

    <script>
        async function loadTasks() {
            document.getElementById('col-todo').innerHTML = '<p style="color:#555; font-size:12px; text-align:center;">Memuat...</p>';
            
            try {
                const res = await fetch('/api/task');
                const tasks = await res.json();
                
                const todo = tasks.filter(t => t.status === 'todo');
                const progress = tasks.filter(t => t.status === 'progress');
                const done = tasks.filter(t => t.status === 'done');

                document.getElementById('count-todo').innerText = todo.length;
                document.getElementById('count-progress').innerText = progress.length;
                document.getElementById('count-done').innerText = done.length;

                renderColumn('col-todo', todo);
                renderColumn('col-progress', progress);
                renderColumn('col-done', done);
            } catch (e) {
                alert('Gagal mengambil data tugas.');
            }
        }

        function renderColumn(colId, tasks) {
            const col = document.getElementById(colId);
            if(tasks.length === 0) {
                col.innerHTML = '<p style="color:#444; font-size:12px; text-align:center; margin-top:20px;">Kosong</p>';
                return;
            }

            col.innerHTML = tasks.map(t => {
                let moveLeft = '', moveRight = '';
                
                if(t.status === 'todo') {
                    moveRight = `<button class="t-btn" onclick="moveTask('${t._id}', 'progress')">Proses ❯</button>`;
                } else if(t.status === 'progress') {
                    moveLeft = `<button class="t-btn" onclick="moveTask('${t._id}', 'todo')">❮ Batal</button>`;
                    moveRight = `<button class="t-btn" onclick="moveTask('${t._id}', 'done')">Selesai ❯</button>`;
                } else if(t.status === 'done') {
                    moveLeft = `<button class="t-btn" onclick="moveTask('${t._id}', 'progress')">❮ Ulang</button>`;
                }

                return `
                <div class="task-card">
                    <div class="task-text">${t.text}</div>
                    <div class="task-actions">
                        <button class="t-btn t-btn-delete" onclick="deleteTask('${t._id}')">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                        <div class="move-btns">
                            ${moveLeft}
                            ${moveRight}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        async function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value;
            if(!text.trim()) return;

            input.value = 'Menyimpan...';
            input.disabled = true;

            try {
                await fetch('/api/task', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ text })
                });
                input.value = '';
                loadTasks();
            } catch (e) {
                alert('Gagal menyimpan tugas.');
            } finally {
                input.disabled = false;
                input.focus();
            }
        }

        async function moveTask(id, newStatus) {
            try {
                await fetch('/api/task', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id, newStatus })
                });
                loadTasks();
            } catch (e) {
                alert('Gagal memindahkan tugas.');
            }
        }

        async function deleteTask(id) {
            if(!confirm('Hapus tugas ini?')) return;
            try {
                await fetch('/api/task', {
                    method: 'DELETE',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id })
                });
                loadTasks();
            } catch (e) {
                alert('Gagal menghapus tugas.');
            }
        }

        // Fitur tambah tugas pakai tombol Enter di keyboard
        document.getElementById('taskInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') addTask();
        });

        loadTasks();
    </script>
</body>
</html>
