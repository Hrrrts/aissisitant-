<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ais Wishlist</title>
    <link rel="stylesheet" href="css/wishlist.css">
    <link rel="stylesheet" href="css/global.css"> 
</head>
<body>
    <div class="top-bar">
        <a href="index.html" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <h2 class="title-header">Wishlist</h2>
        <div style="width:24px;"></div>
    </div>

    <div class="add-card">
        <span class="add-card-title">Tambah Keinginan</span>
        
        <div class="input-group-btn">
            <input type="text" id="w-link" class="input-wish" placeholder="Tempel link produk (Shopee, Tokped, dll)...">
            <button id="btnCheckLink" class="btn-check-link" onclick="fetchLinkMetadata()">Cek Link</button>
        </div>
        
        <input type="text" id="w-title" class="input-wish" placeholder="Nama Barang">
        <input type="text" id="w-image" class="input-wish" placeholder="URL Gambar Produk (Bisa Otomatis/Manual)">
        <input type="text" id="w-reason" class="input-wish" placeholder="Kenapa harus beli barang ini?">
        
        <div class="form-row" style="margin-bottom:0; display:flex; gap:10px;">
            <input type="number" id="w-price" class="input-wish" placeholder="Harga Asli" style="flex:1;">
            <div class="toggle-wrapper" style="margin:0;">
                <input type="checkbox" id="w-isDiscount" style="accent-color:#fbbf24; width:16px; height:16px;">
                <label for="w-isDiscount">Lagi Diskon</label>
            </div>
        </div>

        <div id="discountPriceGroup" style="display: none;">
            <input type="number" id="w-discountPrice" class="input-wish" placeholder="Harga Diskon">
        </div>

        <button id="btnSaveWish" class="btn-primary-gold" onclick="saveWishlistItem()" style="margin-top:5px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            TAMBAHKAN IMPIAN
        </button>
    </div>

    <div class="wishlist-grid" id="wishlistGrid"></div>

    <div id="detailModal" class="modal-overlay" onclick="closeDetailModal()">
        <div class="modal-content-box" onclick="event.stopPropagation()">
            <img id="m-img" class="modal-img-preview" src="" alt="Preview">
            
            <div>
                <h3 id="m-title" class="modal-title-text">Nama Produk</h3>
                <div id="m-price-area" style="margin-top: 6px;"></div>
            </div>

            <div class="modal-desc-box">
                <div style="font-size:11px; font-weight:700; color:#fbbf24; text-transform:uppercase; margin-bottom:4px; letter-spacing:0.5px;">Alasan Membeli</div>
                <div id="m-reason">Detail catatan...</div>
            </div>

            <div class="modal-footer-actions">
                <button class="btn-sec-dark" id="m-delete-btn" title="Hapus">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
                <a id="m-link-btn" href="#" target="_blank" class="btn-primary-gold">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                    Buka Link Produk
                </a>
            </div>
        </div>
    </div>

    <script src="js/wishlist.js"></script>
</body>
</html>
