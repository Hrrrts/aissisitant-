<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ais Vault</title>
    <link rel="stylesheet" href="css/vault.css">
    <link rel="stylesheet" href="css/global.css">
</head>
<body>
    <div class="top-bar">
        <a href="index.html" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <h2 class="title-header">Ais Vault</h2>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
    </div>

    <div class="add-card">
        <h3 class="add-card-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg> 
            Simpan Baru
        </h3>
        <input type="text" id="v-title" class="input-vault" placeholder="Nama Aplikasi/Web (Cth: Netflix)">
        <input type="text" id="v-username" class="input-vault" placeholder="Username / Email (Opsional)">
        <input type="password" id="v-password" class="input-vault" placeholder="Password (Sensitif)">
        <button id="btnSaveVault" class="btn-save" onclick="savePassword()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
            Simpan Password
        </button>
    </div>

    <div class="vault-grid" id="vaultContainer">
        </div>

    <div id="vaultToast" class="toast"></div>

    <script src="js/vault.js"></script>
</body>
</html>
