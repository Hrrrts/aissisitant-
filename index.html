<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aissistant</title>
    <!-- Masukin Global CSS -->
    <link rel="stylesheet" href="css/global.css">
    <style>
        body { padding: 40px 20px 100px 20px; }
        .header { margin-bottom: 25px; }
        .header h1 { font-size: 32px; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .header p { color: #888; font-size: 14px; margin-top: 6px; font-weight: 600;}
        
        .card { display: flex; align-items: center; justify-content: space-between; background: #0a0a0a; border: 1px solid #222; border-radius: 20px; padding: 20px; text-decoration: none; color: inherit; transition: 0.2s ease; margin-bottom: 16px; }
        .card:active { background: #151515; transform: scale(0.97); border-color:#444;}
        .card-left { display: flex; align-items: center; gap: 16px; }
        .icon-box { display: flex; align-items: center; justify-content: center; width: 50px; height: 50px; background: #111; border: 1px solid #333; border-radius: 14px; color: #fff; }
        .card-title { font-size: 16px; font-weight: 700; margin: 0; color: #fff;}
        .card-subtitle { font-size: 13px; color: #888; margin: 4px 0 0 0; font-weight: 600;}
    </style>
</head>
<body class="page-transition">
    <div class="header">

    </div>

    <a href="music.html" class="card">
        <div class="card-left">
            <div class="icon-box">
                <svg width="24" height="24" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
            </div>
            <div>
                <p class="card-title">Aismusic</p>

        <div><svg width="20" height="20" viewBox="0 0 24 24" stroke="#555"><polyline points="9 18 15 12 9 6"></polyline></svg></div>
