<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aissistant</title>
    <style>
        body { background-color: #000000; color: #ededed; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 40px 20px; }
        .header { margin-bottom: 25px; }
        .header h1 { font-size: 28px; font-weight: 700; margin: 0; color: #ffffff; letter-spacing: -0.5px; }
        .header p { color: #888888; font-size: 14px; margin-top: 6px; }
        
        /* Widget Quotes Harian */
        .quote-widget { background: linear-gradient(135deg, #111111, #1a1a1a); border-left: 3px solid #ffffff; padding: 18px 20px; border-radius: 0 12px 12px 0; margin-bottom: 35px; display: none; }
        .quote-text { margin: 0; font-size: 13px; color: #dddddd; line-height: 1.6; font-style: italic; }
        .quote-author { margin: 8px 0 0 0; font-size: 11px; color: #777777; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .card { display: flex; align-items: center; justify-content: space-between; background: #111111; border: 1px solid #222222; border-radius: 16px; padding: 20px; text-decoration: none; color: inherit; transition: 0.2s ease; margin-bottom: 16px; }
        .card:active { background: #1a1a1a; transform: scale(0.98); }
        .card-left { display: flex; align-items: center; gap: 16px; }
        .icon-box { display: flex; align-items: center; justify-content: center; width: 48px; height: 48px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; color: #ffffff; }
        .card-title { font-size: 16px; font-weight: 600; margin: 0; color: #ffffff;}
        .card-subtitle { font-size: 13px; color: #888888; margin: 4px 0 0 0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Aissistant</h1>
        <p>Sistem Personal Backend</p>
    </div>

    <!-- Widget Quotes (Hanya muncul kalau ada isinya) -->
    <div class="quote-widget" id="quoteWidget">
        <p class="quote-text" id="quoteText"></p>
        <p class="quote-author">- Harits</p>
    </div>
    
    <a href="music.html" class="card">
        <div class="card-left">
            <div class="icon-box">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
            </div>
            <div>
                <p class="card-title">Aismusic</p>
                <p class="card-subtitle">Smart Audio Search</p>
            </div>
        </div>
        <div>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
    </a>

    <a href="ideas.html" class="card">
        <div class="card-left">
            <div class="icon-box">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            </div>
            <div>
                <p class="card-title">Bubble Ideas</p>
                <p class="card-subtitle">Catatan & Brainstorming</p>
            </div>
        </div>
        <div>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
    </a>

    <script>
        // Cek memori lokal, kalau ada quotes, tampilkan. Kalau kosong, sembunyikan.
        const savedQuote = localStorage.getItem('my_quote');
        if (savedQuote && savedQuote.trim() !== '') {
            document.getElementById('quoteWidget').style.display = 'block';
            document.getElementById('quoteText').innerText = '"' + savedQuote + '"';
        }
    </script>
</body>
</html>
