<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aissistant</title>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 25px; }
        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 40px; margin-top: 20px;}
        .header h1 { margin: 0; font-size: 26px; color: #38bdf8; letter-spacing: 1px;}
        .module-title { font-size: 13px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; font-weight: bold;}
        .card { background-color: #1e293b; padding: 20px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: white; transition: 0.2s; border: 1px solid #334155;}
        .card:active { transform: scale(0.98); background-color: #334155; }
        .card-left { display: flex; align-items: center; gap: 18px; }
        .icon { background-color: #3b82f6; padding: 12px; border-radius: 12px; font-size: 20px;}
        .title { font-size: 19px; font-weight: bold; margin: 0; }
        .subtitle { font-size: 13px; color: #94a3b8; margin: 5px 0 0 0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 Aissistant</h1>
    </div>
    <div class="module-title">Modul Sistem</div>
    <a href="music.html" class="card">
        <div class="card-left">
            <div class="icon">🎵</div>
            <div>
                <p class="title">Aisplayer</p>
                <p class="subtitle">Smart Audio AI</p>
            </div>
        </div>
        <div>❯</div>
    </a>
</body>
</html>
