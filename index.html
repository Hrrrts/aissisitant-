<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aissistant Dashboard</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        /* Background Gradien Bergerak Ala AI */
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(-45deg, #050505, #0f172a, #1e1b4b, #050505);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #e2e8f0;
            min-height: 100vh;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Efek Kaca Premium */
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .glass-card:active { transform: scale(0.98); }
        
        /* Teks & Ikon Menyala */
        .glow-text { color: #38bdf8; text-shadow: 0 0 15px rgba(56, 189, 248, 0.5); }
        .icon-box {
            background: rgba(56, 189, 248, 0.1);
            border-radius: 14px;
            width: 55px; height: 55px;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-transparent pt-4 px-4">
    <span class="navbar-brand mb-0 h1 glow-text fw-bold" style="font-size: 1.5rem;">
        <i class="bi bi-robot"></i> Aissistant
    </span>
</nav>

<div class="container py-4 px-4">
    <div class="glass-card p-4 text-center mb-5 border-info" style="border-style: dashed; border-width: 2px;">
        <div class="d-flex justify-content-center mb-3">
            <div class="icon-box" style="background: rgba(16, 185, 129, 0.1);">
                <i class="bi bi-shield-lock-fill text-success fs-2"></i>
            </div>
        </div>
        <h3 class="fw-bold text-success mb-1">Secure Mode</h3>
        <p class="text-secondary mb-0" style="font-size: 0.9rem;">Sistem backend aktif. API Key terlindungi.</p>
    </div>

    <h6 class="text-secondary fw-bold mb-3 ms-1" style="letter-spacing: 1px;">MODUL SISTEM</h6>
    
    <div class="row g-3">
        <div class="col-12">
            <a href="music.html" class="text-decoration-none">
                <div class="glass-card p-3 d-flex align-items-center justify-content-between">
                    <div class="d-flex align-items-center gap-3">
                        <div class="icon-box">
                            <i class="bi bi-music-note-beamed glow-text fs-3"></i>
                        </div>
                        <div>
                            <h5 class="text-white mb-0 fw-bold">Aisplayer</h5>
                            <p class="text-secondary mb-0" style="font-size: 0.85rem;">Smart Audio AI</p>
                        </div>
                    </div>
                    <i class="bi bi-chevron-right text-secondary fs-4 me-2"></i>
                </div>
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
