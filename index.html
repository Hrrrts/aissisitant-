<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aissistant</title>
    <style>
        body { background-color: #000000; color: #ededed; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 40px 20px; }
        .header { margin-bottom: 40px; }
        .header h1 { font-size: 28px; font-weight: 700; margin: 0; color: #ffffff; letter-spacing: -0.5px; }
        .header p { color: #888888; font-size: 14px; margin-top: 6px; }
        .card { display: flex; align-items: center; justify-content: space-between; background: #111111; border: 1px solid #222222; border-radius: 16px; padding: 20px; text-decoration: none; color: inherit; transition: 0.2s ease; }
        .card:active { background: #1a1a1a; transform: scale(0.98); }
        .card-left { display: flex; align-items: center; gap: 16px; }
        .icon-box { display: flex; align-items: center; justify-content: center; width: 48px; height: 48px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; color: #ffffff; }
        .card-title { font-size: 16px; font-weight: 600; margin: 0; color: #ffffff;}
        .card-subtitle { font-size: 13px; color: #888888; margin: 4px 0 0 0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Aissistant</h1>
        <p>Sistem Personal Backend</p>
    </div>
    
    <a href="music.html" class="card">
        <div class="card-left">
            <div class="icon-box">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
            </div>
            <div>
                <p class="card-title">Aismusic</p>
                <p class="card-subtitle">Smart Audio Search</p>
            </div>
        </div>
        <div>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
    </a>
</body>
</html>
