<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Ideas</title>
    <style>
        body { background-color: #000000; color: #ededed; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 20px; overflow-x: hidden;}
        .top-bar { display: flex; align-items: center; margin-bottom: 30px; margin-top: 10px; }
        .back-btn { color: #ffffff; text-decoration: none; display: flex; align-items: center; cursor: pointer; }
        .title-header { margin: 0 auto; font-size: 15px; font-weight: 600; color: #ffffff; padding-right: 24px; letter-spacing: 0.5px; text-transform: uppercase;}
        
        .section-title { font-size: 13px; color: #888888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; margin-top: 30px; font-weight: 600; }
        
        .input-box { width: 100%; background: #111111; border: 1px solid #222222; color: #ffffff; padding: 16px; border-radius: 16px; font-size: 14px; outline: none; transition: 0.2s; box-sizing: border-box; font-family: inherit; resize: none; margin-bottom: 12px; }
        .input-box:focus { border-color: #444444; }
        
        .btn-action { background: #ffffff; color: #000000; border: none; padding: 14px 20px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.2s; margin-bottom: 8px;}
        .btn-action:active { transform: scale(0.96); background: #dddddd; }
        .btn-danger { background: #1a1a1a; color: #ff4444; border: 1px solid #331111;}
        
        /* DESAIN BUBBLE MELAYANG */
        .bubble-container { margin-top: 30px; display: flex; flex-direction: column; gap: 20px; padding: 10px;}
        .bubble-card { background: linear-gradient(135deg, #1a1a1a, #111111); border: 1px solid #2a2a2a; padding: 20px 24px; font-size: 14px; line-height: 1.6; color: #dddddd; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.4); max-width: 90%; animation: float 4s ease-in-out infinite;}
        
        /* Bikin bentuknya selang-seling kayak chat dan animasinya beda delay */
        .bubble-card:nth-child(odd) { border-radius: 30px 30px 30px 5px; align-self: flex-start; animation-delay: 0s;}
        .bubble-card:nth-child(even) { border-radius: 30px 30px 5px 30px; align-self: flex-end; background: linear-gradient(135deg, #222, #111); animation-delay: -2s;}
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .bubble-date { font-size: 10px; color: #666666; margin-top: 10px; text-align: right; }
        .delete-btn { position: absolute; top: -5px; right: -5px; color: #fff; background: #ff4444; border: none; font-size: 14px; cursor: pointer; padding: 0; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 10;}
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="index.html" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <h2 class="title-header">Bubble Ideas</h2>
    </div>

    <div class="section-title">Tambah Quotes</div>
    <input type="text" id="quoteInput" class="input-box" placeholder="Ketik kata-kata mutiara...">
    <button class="btn-action" onclick="saveQuote()">Pasang Quotes</button>
    <button class="btn-action btn-danger" onclick="clearQuote()">Hapus Semua Quotes</button>

    <div class="section-title" style="margin-top: 40px;">Buat Bubble Baru</div>
    <textarea id="ideaInput" class="input-box" rows="4" placeholder="Lagi mikirin apa? Tumpahin di sini..."></textarea>
    <button class="btn-action" onclick="saveIdea()">Simpan Ide</button>

    <div class="section-title" style="margin-top: 50px; text-align:center;">Isi Kepala</div>
    <div class="bubble-container" id="bubblesList"></div>

    <script>
        // LOGIKA QUOTES (Bisa simpan banyak)
        function saveQuote() {
            const val = document.getElementById('quoteInput').value;
            if(!val.trim()) return;

            let quotes = JSON.parse(localStorage.getItem('ais_quotes_list')) || [];
            
            // Migrasi dari sistem lama kalau masih ada
            const oldQuote = localStorage.getItem('my_quote');
            if (oldQuote) { quotes.push(oldQuote); localStorage.removeItem('my_quote'); }

            quotes.push(val);
            localStorage.setItem('ais_quotes_list', JSON.stringify(quotes));
            
            // FITUR OTOMATIS BERSIHKAN KOLOM KETIKAN
            document.getElementById('quoteInput').value = '';
            alert('Quotes berhasil ditambah!');
        }

        function clearQuote() {
            localStorage.removeItem('ais_quotes_list');
            localStorage.removeItem('my_quote');
            alert('Semua quotes telah dihapus dari sistem.');
        }

        // LOGIKA BUBBLE IDEAS
        let ideas = JSON.parse(localStorage.getItem('my_ideas')) || [];

        function renderIdeas() {
            const list = document.getElementById('bubblesList');
            if (ideas.length === 0) {
                list.innerHTML = '<p style="color:#555; font-size:13px; text-align:center;">Belum ada ide yang disimpan.</p>';
                return;
            }
            list.innerHTML = ideas.map((idea, index) => `
                <div class="bubble-card">
                    <button class="delete-btn" onclick="deleteIdea(${index})">×</button>
                    ${idea.text.replace(/\n/g, '<br>')}
                    <div class="bubble-date">${idea.date}</div>
                </div>
            `).join('');
        }

        function saveIdea() {
            const val = document.getElementById('ideaInput').value;
            if (!val.trim()) return;

            const now = new Date();
            const dateStr = now.toLocaleDateString('id-ID') + ' • ' + now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');

            ideas.unshift({ text: val, date: dateStr });
            localStorage.setItem('my_ideas', JSON.stringify(ideas));
            
            // OTOMATIS BERSIHKAN KOLOM KETIKAN
            document.getElementById('ideaInput').value = '';
            renderIdeas();
        }

        function deleteIdea(index) {
            ideas.splice(index, 1);
            localStorage.setItem('my_ideas', JSON.stringify(ideas));
            renderIdeas();
        }

        renderIdeas();
    </script>
</body>
</html>
