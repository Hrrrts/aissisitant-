<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aismusic</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/music.css">
</head>
<body class="page-transition">
    <div class="main-content">
        <div class="top-bar">
            <a href="index.html" class="back-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <h2 class="title-header">AISMUSIC</h2>
            <div style="width:24px;"></div>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Cari lagu...">
            <button id="searchBtn" class="search-btn">🔍</button>
        </div>

        <div id="searchHistory" class="search-history"></div>
        <div id="searchResults" class="search-results"></div>

        <!-- EXPLORE SCREEN SUDAH DIUPDATE -->
        <div id="exploreScreen" class="home-screen" style="margin-bottom: 20px; margin-top: 20px;">
            <h3 class="section-title">Lagi Trending Nih <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: text-bottom; margin-left: 4px;"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path></svg></h3>
            <div id="exploreGrid" class="playlist-grid" style="display:flex; overflow-x:auto; gap:12px; padding-bottom:10px;">
                <p style="color:#888; font-size:13px; padding-left: 10px;">Memuat lagu trending...</p>
            </div>
        </div>

        <div id="homeScreen" class="home-screen">
            <h3 class="section-title">Koleksi Playlist</h3>
            <div id="playlistGrid" class="playlist-grid">
                <p style="color:#888; font-size:13px; grid-column: span 2;">Memuat data dari server...</p>
            </div>
        </div>
    </div> 

    <div id="miniPlayer" class="mini-player" onclick="openFullPlayer()">
        <img id="miniThumb" src="" alt="Thumb" style="display:none;">
        <div class="mini-info">
            <div id="miniTitle" class="mini-title">Belum ada lagu</div>
            <div id="miniArtist" class="mini-artist">-</div>
        </div>
        <div class="mini-controls" onclick="event.stopPropagation()">
            <button id="miniPlayBtn" class="nav-btn">▶</button>
        </div>
    </div>

    <div id="fullPlayer" class="full-player">
        <div class="fp-header">
            <button class="nav-btn" onclick="closeFullPlayer()">↓</button>
            <span style="font-size:11px; font-weight:bold; letter-spacing:1px; color:#aaa;">SEDANG DIPUTAR</span>
            <button class="nav-btn" onclick="addToPlaylist()" title="Tambah ke Playlist">
                <!-- Tombol Plus Baru (SVG) -->
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
        </div>

        <div class="album-art">
            <img id="fullThumb" class="album-img" src="" alt="Thumbnail">
        </div>
        
        <div class="song-info-container">
            <div class="song-info-text">
                <p class="song-title" id="fullTitle">Belum ada lagu</p>
                <p class="song-artist" id="fullArtist">-</p>
            </div>
            <button id="likeBtn" class="like-btn" onclick="toggleLike()">
                <!-- Tombol Love Baru (SVG) -->
                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
            </button>
        </div>
        
        <div class="progress-container">
            <span class="time-text" id="currentTime">0:00</span>
            <input type="range" id="progressBar" class="progress-bar" value="0" step="1" min="0">
            <span class="time-text" id="durationTime">0:00</span>
        </div>

        <div class="controls">
            <button id="prevBtn" class="nav-btn" disabled>⏮</button>
            <button id="playBtn" class="play-btn">▶</button>
            <button id="nextBtn" class="nav-btn">⏭</button>
        </div>

        <div class="lyrics-section">
            <div id="lyricsContainer" class="lyrics-box"></div>
        </div>
    </div>

    <!-- MODALS TETAP SAMA -->
    <div id="saveModal" style="display:none; z-index:9999; position:fixed; top:0;left:0;width:100%;height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; backdrop-filter:blur(5px);">
        <div style="background:#18181b; padding:24px; border-radius:20px; width:80%; max-width:320px; border:1px solid #27272a;">
            <h3 style="margin-top:0; color:#fff; font-size:18px;">Pilih Playlist</h3>
            <div id="savePlaylistList" style="max-height:200px; overflow-y:auto; margin-bottom:15px; display:flex; flex-direction:column; gap:8px;"></div>
            <div style="font-size:12px; color:#888; margin-bottom:8px;">Atau bikin playlist baru:</div>
            <input type="text" id="newPlaylistInput" placeholder="Nama playlist baru..." style="width:100%; padding:14px; box-sizing:border-box; background:#09090b; border:1px solid #27272a; color:#fff; border-radius:12px; margin-bottom:15px; font-family:inherit;">
            <div style="display:flex; gap:10px;">
                <button onclick="document.getElementById('saveModal').style.display='none'" style="flex:1; padding:12px; background:#27272a; color:#fff; border:none; border-radius:12px; font-weight:600; cursor:pointer;">Batal</button>
                <button onclick="saveToNewPlaylist()" style="flex:1; padding:12px; background:#fbbf24; color:#000; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">Simpan</button>
            </div>
        </div>
    </div>

    <div id="playlistManagerModal" style="display:none; z-index:9999; position:fixed; top:0;left:0;width:100%;height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:flex-end; backdrop-filter:blur(5px);">
        <div style="background:#18181b; padding:24px; border-radius:24px 24px 0 0; width:100%; max-height:80vh; border-top:1px solid #27272a; box-sizing:border-box; display:flex; flex-direction:column; animation: slideUp 0.3s ease;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 id="pmTitle" style="margin:0; color:#fff; font-size:20px;">Nama Playlist</h3>
                <button onclick="closePlaylistManager()" style="background:none; border:none; color:#a1a1aa; font-size:28px; cursor:pointer;">&times;</button>
            </div>
            <div id="pmSongList" style="overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:10px; padding-bottom:20px;"></div>
        </div>
    </div>
    
    <!-- FIX YOUTUBE CONTAINER: Diumpetin di pojok layar, BUKAN display none -->
    <div id="playerContainer" style="position: absolute; width: 1px; height: 1px; top: -9999px; left: -9999px; overflow: hidden;"></div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span>Home</span>
        </a>
        <a href="music.html" class="nav-item active">
            <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
            <span>Music</span>
        </a>
        <a href="task.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
            <span>Task</span>
        </a>
        <a href="wallet.html" class="nav-item">
            <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line></svg>
            <span>Wallet</span>
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <script src="js/music-state.js"></script>
    <script src="js/music-player.js"></script>
    <script src="js/music-search.js"></script>
    <script src="js/music-playlist.js?v=4?v=4"></script>
</body>
</html>
