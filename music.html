<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aisplayer</title>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; }
        .top-bar { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .back-btn { color: #94a3b8; text-decoration: none; font-size: 24px; padding: 5px; }
        
        /* Area Pencarian */
        .search-box { display: flex; gap: 10px; position: relative;}
        .search-box input { flex: 1; padding: 15px 20px; border-radius: 30px; border: none; background-color: #1e293b; color: white; outline: none; font-size: 15px; }
        .search-box button { background-color: #38bdf8; color: #0f172a; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; font-size: 18px; font-weight: bold;}
        
        /* Daftar Lagu Memanjang (Awalnya disembunyikan) */
        .search-results { display: none; background-color: #1e293b; border-radius: 15px; margin-top: 15px; padding: 10px 0; max-height: 250px; overflow-y: auto; border: 1px solid #334155; }
        .result-item { padding: 15px 20px; border-bottom: 1px solid #334155; font-size: 14px; cursor: pointer; }
        .result-item:last-child { border-bottom: none; }
        .result-item:active { background-color: #334155; }

        /* Area Player */
        .player-card { background: linear-gradient(145deg, #1e293b, #0f172a); padding: 30px 20px; border-radius: 25px; text-align: center; margin-top: 30px; border: 1px solid #334155; }
        .album-art { width: 100%; aspect-ratio: 1/1; background: linear-gradient(45deg, #38bdf8, #818cf8); border-radius: 20px; margin-bottom: 25px; display: flex; justify-content: center; align-items: center; font-size: 60px;}
        .song-title { font-size: 20px; font-weight: bold; margin: 0 0 10px 0; }
        .controls { margin-top: 20px; }
        .controls button { background: none; border: none; color: white; font-size: 30px; margin: 0 15px; padding: 10px; cursor: pointer;}
        .play-btn { background-color: #38bdf8 !important; color: #0f172a !important; border-radius: 50%; width: 65px; height: 65px; display: inline-flex; justify-content: center; align-items: center; }

        /* Area Lirik */
        .lyrics-container { background-color: #1e293b; padding: 25px; border-radius: 20px; margin-top: 25px; font-size: 15px; line-height: 1.8; color: #cbd5e1; text-align: center; max-height: 300px; overflow-y: auto; border: 1px solid #334155; display: none; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="index.html" class="back-btn">←</a>
        <h2 style="margin: 0; font-size: 18px; color: #cbd5e1;">Aisplayer</h2>
    </div>

    <!-- Kotak Pencarian -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Ketik nama lagu & penyanyi...">
        <button id="searchBtn">🔍</button>
    </div>

    <!-- Wadah Daftar Pencarian -->
    <div id="searchResults" class="search-results">
        <!-- Hasil lagu akan muncul di sini nanti -->
    </div>

    <!-- Player Utama -->
    <div class="player-card">
        <div class="album-art">🎵</div>
        <p class="song-title" id="title">Ais Standby</p>
        <div class="controls">
            <button id="playBtn" class="play-btn">▶</button>
        </div>
        <!-- Wadah Audio -->
        <div id="playerContainer" style="display: none;"></div>
    </div>

    <!-- Wadah Lirik Lagu -->
    <div id="lyricsContainer" class="lyrics-container">
        <!-- Teks Lirik akan muncul di sini nanti -->
    </div>
</body>
</html>
