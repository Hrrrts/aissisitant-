<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aismusic</title>
    <link rel="stylesheet" href="css/music.css">
</head>
<body>
    <div class="main-content">
        <div class="top-bar">
            <a href="index.html" class="back-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <h2 class="title-header">AISMUSIC</h2>
            <div style="width:24px;"></div>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Cari lagu...">
            <button id="searchBtn" class="search-btn">🔍</button>
        </div>

        <div id="searchResults" class="search-results"></div>

        <div id="homeScreen" class="home-screen">
            <h3 class="section-title">Koleksi Playlist</h3>
            <div id="playlistGrid" class="playlist-grid">
                <p style="color:#888; font-size:13px; grid-column: span 2;">Memuat data dari server...</p>
            </div>
        </div>
        <div style="height: 100px;"></div>
    </div>

    <div id="miniPlayer" class="mini-player" onclick="openFullPlayer()">
        <img id="miniThumb" src="" alt="Thumb" style="display:none;">
        <div class="mini-info">
            <div id="miniTitle" class="mini-title">Belum ada lagu</div>
            <div id="miniArtist" class="mini-artist">-</div>
        </div>
        <div class="mini-controls" onclick="event.stopPropagation()">
            <button id="miniPlayBtn" class="nav-btn">▶</button>
        </div>
    </div>

    <div id="fullPlayer" class="full-player">
        <div class="fp-header">
            <button class="nav-btn" onclick="closeFullPlayer()">↓</button>
            <span style="font-size:11px; font-weight:bold; letter-spacing:1px; color:#aaa;">SEDANG DIPUTAR</span>
            <button class="nav-btn" onclick="addToPlaylist()" title="Tambah ke Playlist">➕</button>
        </div>

        <div class="album-art">
            <img id="fullThumb" class="album-img" src="" alt="Thumbnail">
        </div>
        
        <div class="song-info-container">
            <div style="flex: 1; text-align: left;">
                <p class="song-title" id="fullTitle">Belum ada lagu</p>
                <p class="song-artist" id="fullArtist">-</p>
            </div>
            <button id="likeBtn" class="like-btn" onclick="toggleLike()">♡</button>
        </div>
        
        <div class="progress-container">
            <span class="time-text" id="currentTime">0:00</span>
            <input type="range" id="progressBar" class="progress-bar" value="0" step="1" min="0">
            <span class="time-text" id="durationTime">0:00</span>
        </div>

        <div class="controls">
            <button id="prevBtn" class="nav-btn" disabled>⏮</button>
            <button id="playBtn" class="play-btn">▶</button>
            <button id="nextBtn" class="nav-btn">⏭</button>
        </div>

        <div class="lyrics-section">
            <div id="lyricsContainer" class="lyrics-box"></div>
        </div>
    </div>
    
    <div id="playerContainer" style="display: none;"></div>
    <script src="js/music.js"></script>
</body>
</html>
