<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aismusic</title>
    <style>
        body { background-color: #000000; color: #ededed; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 20px; }
        .top-bar { display: flex; align-items: center; margin-bottom: 30px; margin-top: 10px; }
        .back-btn { color: #ffffff; text-decoration: none; display: flex; align-items: center; cursor: pointer; }
        .title-header { margin: 0 auto; font-size: 15px; font-weight: 600; color: #ffffff; padding-right: 24px; letter-spacing: 0.5px;}
        .search-container { position: relative; display: flex; gap: 10px; }
        .search-input { flex: 1; background: #111111; border: 1px solid #222222; color: #ffffff; padding: 16px 20px; border-radius: 12px; font-size: 15px; outline: none; transition: 0.2s; }
        .search-input:focus { border-color: #444444; }
        .search-btn { background: #ffffff; color: #000000; border: none; border-radius: 12px; width: 54px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .search-results { display: none; background: #111111; border: 1px solid #222222; border-radius: 12px; margin-top: 10px; max-height: 250px; overflow-y: auto; }
        .result-item { padding: 16px 20px; border-bottom: 1px solid #222222; font-size: 14px; cursor: pointer; color: #dddddd; line-height: 1.4; }
        .result-item:last-child { border-bottom: none; }
        .result-item:active { background: #1a1a1a; }
        .result-title { font-weight: 600; color: #ffffff; margin-bottom: 4px; }
        .result-channel { font-size: 12px; color: #888888; }
        
        .player-section { margin-top: 30px; display: flex; flex-direction: column; align-items: center; }
        .album-art { width: 100%; max-width: 300px; aspect-ratio: 1/1; background: linear-gradient(135deg, #151515, #050505); border: 1px solid #222222; border-radius: 20px; display: flex; align-items: center; justify-content: center; color: #222222; margin-bottom: 20px; overflow: hidden;}
        .album-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .song-title { font-size: 20px; font-weight: 700; margin: 0 0 6px 0; text-align: center; color: #ffffff; }
        .song-artist { font-size: 14px; color: #888888; margin: 0 0 20px 0; text-align: center; }
        
        .progress-container { width: 100%; max-width: 320px; display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .time-text { font-size: 12px; color: #888888; width: 35px; text-align: center; font-variant-numeric: tabular-nums; }
        .progress-bar { flex: 1; height: 4px; -webkit-appearance: none; background: #333333; border-radius: 2px; outline: none; }
        .progress-bar::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #ffffff; cursor: pointer; }

        .controls { display: flex; align-items: center; gap: 24px; }
        .play-btn { width: 64px; height: 64px; border-radius: 50%; background: #ffffff; color: #000000; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;}
        .play-btn:active { transform: scale(0.95); }
        .nav-btn { background: none; border: none; color: #ffffff; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 10px; transition: 0.2s; opacity: 0.7;}
        .nav-btn:active { transform: scale(0.9); opacity: 1;}
        .nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        
        .lyrics-section { margin-top: 40px; width: 100%; box-sizing: border-box; }
        .lyrics-title { font-size: 12px; color: #888888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; font-weight: 600; text-align: center; display: none; }
        .lyrics-box { background: #111111; border: 1px solid #222222; border-radius: 16px; padding: 24px 20px; font-size: 16px; line-height: 2.2; color: #555555; text-align: center; height: 350px; overflow-y: auto; display: none; scroll-behavior: smooth; position: relative;}
        
        .lyric-line { transition: color 0.3s ease, transform 0.3s ease; padding: 4px 0; }
        .lyric-active { color: #ffffff; font-weight: bold; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="index.html" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <h2 class="title-header">AISMUSIC</h2>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Cari lagu...">
        <button id="searchBtn" class="search-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
    </div>

    <div id="searchResults" class="search-results"></div>

    <div class="player-section">
        <div class="album-art" id="albumArtContainer">
            <svg id="defaultIcon" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
            <img id="albumImage" class="album-img" src="" alt="Thumbnail">
        </div>
        
        <p class="song-title" id="title">Belum ada lagu</p>
        <p class="song-artist" id="artist">-</p>
        
        <div class="progress-container">
            <span class="time-text" id="currentTime">0:00</span>
            <input type="range" id="progressBar" class="progress-bar" value="0" step="1" min="0">
            <span class="time-text" id="durationTime">0:00</span>
        </div>

        <div class="controls">
            <!-- Tombol Previous -->
            <button id="prevBtn" class="nav-btn" disabled>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"></line></svg>
            </button>
            
            <button id="playBtn" class="play-btn">
                <svg id="playIcon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            </button>
            
            <!-- Tombol Next -->
            <button id="nextBtn" class="nav-btn">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"></line></svg>
            </button>
        </div>
        
        <div id="playerContainer" style="display: none;"></div>
    </div>

    <div class="lyrics-section">
        <div id="lyricsTitle" class="lyrics-title">LIRIK LAGU</div>
        <div id="lyricsContainer" class="lyrics-box"></div>
    </div>

    <script>
        let player;
        let currentVideoId = '';
        let isPlaying = false;
        let progressInterval;
        
        // Variabel Histori Lagu
        let playHistory = [];
        let historyIndex = -1;

        let parsedLyrics = [];
        let currentLyricIndex = -1;

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('playerContainer', {
                height: '0',
                width: '0',
                videoId: '',
                playerVars: { 'autoplay': 1, 'controls': 0, 'playsinline': 1 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function formatTime(seconds) {
            if (!seconds) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m + ":" + (s < 10 ? "0" : "") + s;
        }

        function onPlayerStateChange(event) {
            const playIcon = document.getElementById('playIcon');
            const progressBar = document.getElementById('progressBar');
            
            if (event.data == YT.PlayerState.ENDED) {
                playNextLogics(); // Otomatis ke lagu berikutnya jika habis
                return;
            }

            if (event.data == YT.PlayerState.PLAYING) {
                isPlaying = true;
                playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>';
                
                progressBar.max = player.getDuration();
                document.getElementById('durationTime').innerText = formatTime(player.getDuration());
                
                progressInterval = setInterval(() => {
                    const current = player.getCurrentTime();
                    progressBar.value = current;
                    document.getElementById('currentTime').innerText = formatTime(current);
                    syncLyrics(current);
                }, 500);

            } else {
                isPlaying = false;
                playIcon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"></polygon>';
                clearInterval(progressInterval);
            }
        }

        document.getElementById('progressBar').addEventListener('input', (e) => {
            if(player && player.seekTo) {
                player.seekTo(e.target.value, true);
                document.getElementById('currentTime').innerText = formatTime(e.target.value);
                syncLyrics(e.target.value);
            }
        });

        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const searchResults = document.getElementById('searchResults');
        
        searchBtn.addEventListener('click', async () => {
            const query = searchInput.value;
            if (!query) return;
            executeSearch(query);
        });

        async function executeSearch(query) {
            searchResults.style.display = 'block';
            searchResults.innerHTML = '<div class="result-item" style="text-align:center;">Mencari...</div>';
            
            try {
                const response = await fetch('/api/search?q=' + encodeURIComponent(query));
                const data = await response.json();
                
                if(Array.isArray(data) && data.length > 0) {
                    searchResults.innerHTML = data.map(item => `
                        <div class="result-item" onclick="selectSong('${item.videoId}', '${item.title.replace(/'/g, "\\'")}', '${item.channel.replace(/'/g, "\\'")}')">
                            <div class="result-title">${item.title}</div>
                            <div class="result-channel">${item.channel}</div>
                        </div>
                    `).join('');
                } else {
                    searchResults.innerHTML = '<div class="result-item">Lagu tidak ditemukan.</div>';
                }
            } catch (error) {
                searchResults.innerHTML = '<div class="result-item">Koneksi ke server terputus.</div>';
            }
        }

        // Trik Mencari Lagu "Vibes" Serupa dari Artis Lain
        async function fetchSimilarVibes() {
            const currentTitle = playHistory[historyIndex].title;
            const currentArtist = playHistory[historyIndex].channel;
            
            // Tambahkan kata kunci "mix" agar YouTube memberikan playlist campuran
            const searchQ = currentTitle + " " + currentArtist + " mix audio";
            document.getElementById('title').innerText = "Mencari vibes serupa...";
            
            try {
                const res = await fetch('/api/search?q=' + encodeURIComponent(searchQ));
                const data = await res.json();
                if (Array.isArray(data) && data.length > 1) {
                    const filtered = data.filter(item => item.videoId !== currentVideoId);
                    const nextSong = filtered[Math.floor(Math.random() * filtered.length)] || data[0];
                    selectSong(nextSong.videoId, nextSong.title, nextSong.channel);
                }
            } catch (e) {
                console.log("Auto-play gagal.");
            }
        }

        // FUNGSI NAVIGASI TOMBOL NEXT & PREVIOUS
        function updateNavButtons() {
            document.getElementById('prevBtn').disabled = historyIndex <= 0;
        }

        function playNextLogics() {
            if (!currentVideoId) return;
            if (historyIndex < playHistory.length - 1) {
                // Maju ke histori selanjutnya yang pernah kita lewati
                historyIndex++;
                const nextSong = playHistory[historyIndex];
                loadSongToPlayer(nextSong.videoId, nextSong.title, nextSong.channel);
            } else {
                // Kalau sudah di ujung histori, cari vibes baru
                fetchSimilarVibes();
            }
        }

        document.getElementById('nextBtn').addEventListener('click', playNextLogics);

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (historyIndex > 0) {
                historyIndex--;
                const prevSong = playHistory[historyIndex];
                loadSongToPlayer(prevSong.videoId, prevSong.title, prevSong.channel);
            }
        });

        async function fetchLyrics(rawTitle, artist) {
            const lyricsBox = document.getElementById('lyricsContainer');
            const lyricsTitle = document.getElementById('lyricsTitle');
            
            lyricsTitle.style.display = 'block';
            lyricsBox.style.display = 'block';
            lyricsBox.innerHTML = '<div style="margin-top:40%;"><i style="color:#777;">Mencari lirik...</i></div>';
            parsedLyrics = [];
            currentLyricIndex = -1;

            let cleanTitle = rawTitle.replace(/\[.*?\]|\(.*?\)/g, '').trim();
            let searchQuery = cleanTitle.includes('-') ? (cleanTitle.split('-')[1].trim() + ' ' + cleanTitle.split('-')[0].trim()) : (cleanTitle + ' ' + artist);

            try {
                const res = await fetch('https://lrclib.net/api/search?q=' + encodeURIComponent(searchQuery));
                const data = await res.json();

                if (data && data.length > 0) {
                    if (data[0].syncedLyrics) {
                        parseSyncedLyrics(data[0].syncedLyrics);
                    } else if (data[0].plainLyrics) {
                        lyricsBox.innerHTML = data[0].plainLyrics.replace(/\n/g, '<br><br>');
                    } else {
                        lyricsBox.innerHTML = '<div style="margin-top:40%;"><i style="color:#777;">Lirik tidak ditemukan.</i></div>';
                    }
                } else {
                    lyricsBox.innerHTML = '<div style="margin-top:40%;"><i style="color:#777;">Maaf, lirik tidak ditemukan untuk lagu ini.</i></div>';
                }
            } catch (e) {
                lyricsBox.innerHTML = '<div style="margin-top:40%;"><i style="color:#777;">Gagal memuat lirik (koneksi terputus).</i></div>';
            }
        }

        function parseSyncedLyrics(lrc) {
            const lines = lrc.split('\n');
            const regex = /\[(\d{2}):(\d{2}\.\d{2})\](.*)/;
            let html = '<div style="height: 120px;"></div>';
            
            lines.forEach((line, index) => {
                const match = line.match(regex);
                if (match) {
                    const min = parseInt(match[1]);
                    const sec = parseFloat(match[2]);
                    const time = (min * 60) + sec;
                    const text = match[3].trim() || '🎵';
                    parsedLyrics.push({ time, text, id: 'lyric-' + index });
                    html += `<div id="lyric-${index}" class="lyric-line">${text}</div>`;
                }
            });
            html += '<div style="height: 150px;"></div>';
            document.getElementById('lyricsContainer').innerHTML = html;
        }

        function syncLyrics(currentTime) {
            if (parsedLyrics.length === 0) return;
            
            let activeIndex = -1;
            for (let i = 0; i < parsedLyrics.length; i++) {
                if (currentTime >= parsedLyrics[i].time) {
                    activeIndex = i;
                } else {
                    break;
                }
            }

            if (activeIndex !== -1 && activeIndex !== currentLyricIndex) {
                if (currentLyricIndex !== -1) {
                    const oldEl = document.getElementById(parsedLyrics[currentLyricIndex].id);
                    if (oldEl) oldEl.classList.remove('lyric-active');
                }
                
                currentLyricIndex = activeIndex;
                const newEl = document.getElementById(parsedLyrics[activeIndex].id);
                
                if (newEl) {
                    newEl.classList.add('lyric-active');
                    const container = document.getElementById('lyricsContainer');
                    container.scrollTo({
                        top: newEl.offsetTop - (container.clientHeight / 2),
                        behavior: 'smooth'
                    });
                }
            }
        }

        // Fungsi internal untuk memuat lagu tanpa menambah histori
        function loadSongToPlayer(videoId, title, channel) {
            currentVideoId = videoId;
            document.getElementById('title').innerText = title;
            document.getElementById('artist').innerText = channel;
            
            document.getElementById('defaultIcon').style.display = 'none';
            const albumImg = document.getElementById('albumImage');
            albumImg.src = 'https://img.youtube.com/vi/' + videoId + '/hqdefault.jpg';
            albumImg.style.display = 'block';
            
            if (player && player.loadVideoById) {
                player.loadVideoById(videoId);
            }
            updateNavButtons();
            fetchLyrics(title, channel);
        }

        // Fungsi yang dipanggil saat user menekan lagu dari daftar pencarian
        function selectSong(videoId, title, channel) {
            document.getElementById('searchResults').style.display = 'none';
            
            // Hapus sisa histori di depan jika kita mundur lalu memilih lagu baru
            if (historyIndex < playHistory.length - 1) {
                playHistory = playHistory.slice(0, historyIndex + 1);
            }
            
            // Tambahkan ke histori
            playHistory.push({videoId, title, channel});
            historyIndex++;
            
            loadSongToPlayer(videoId, title, channel);
        }

        document.getElementById('playBtn').addEventListener('click', () => {
            if (!currentVideoId || !player) return;
            if (isPlaying) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        });
    </script>
</body>
</html>
