<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aismusic</title>
    <link rel="stylesheet" href="css/music.css">
</head>
<body>
    <div class="top-bar">
        <a href="index.html" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <h2 class="title-header">AISMUSIC</h2>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Cari lagu...">
        <button id="searchBtn" class="search-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
    </div>

    <div id="searchResults" class="search-results"></div>

    <div class="player-section">
        <div class="album-art" id="albumArtContainer">
            <svg id="defaultIcon" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
            <img id="albumImage" class="album-img" src="" alt="Thumbnail">
        </div>
        
        <p class="song-title" id="title">Belum ada lagu</p>
        <p class="song-artist" id="artist">-</p>
        
        <div class="progress-container">
            <span class="time-text" id="currentTime">0:00</span>
            <input type="range" id="progressBar" class="progress-bar" value="0" step="1" min="0">
            <span class="time-text" id="durationTime">0:00</span>
        </div>

        <div class="controls">
            <button id="prevBtn" class="nav-btn" disabled>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"></line></svg>
            </button>
            
            <button id="playBtn" class="play-btn">
                <svg id="playIcon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            </button>
            
            <button id="nextBtn" class="nav-btn">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"></line></svg>
            </button>
        </div>
        
        <div id="playerContainer" style="display: none;"></div>
    </div>

    <div class="lyrics-section">
        <div id="lyricsTitle" class="lyrics-title">LIRIK LAGU</div>
        <div id="lyricsContainer" class="lyrics-box"></div>
    </div>

    <script src="js/music.js"></script>
</body>
</html>
